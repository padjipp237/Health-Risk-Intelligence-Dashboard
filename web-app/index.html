<!DOCTYPE html>
<html>
<head>
    <title>Health Risk Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Health Risk Calculator</h1>

<label>Smoking:</label>
<select id="smoker">
    <option>No</option>
    <option>Yes</option>
</select>

<label>Exercise:</label>
<select id="exercise">
    <option>None</option>
    <option>1-2 times/week</option>
    <option>3-5 times/week</option>
    <option>Daily</option>
</select>

<label>Diet Quality:</label>
<select id="diet">
    <option>Poor</option>
    <option>Average</option>
    <option>Good</option>
    <option>Excellent</option>
</select>

<label>Sleep Hours:</label>
<input type="number" id="sleep">

<label>Stress Level (1-10):</label>
<input type="number" id="stress">

<button onclick="calculateRisk()">Calculate Risk</button>

<h2 id="result"></h2>
<h3 id="recommendation"></h3>

<script src="script.js"></script>

</body>
</html>
