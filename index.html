<!DOCTYPE html>
<html>
<head>
    <title>Health Risk Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="container">

<h1>Health Risk Calculator</h1>
<div class="form-group">
<label><i class="fa-solid fa-smoking"></i> Smoking</label>
    <select id="smoker">
        <option>No</option>
        <option>Yes</option>
    </select>
</div>

<div class="form-group">
<label><i class="fa-solid fa-dumbbell"></i> Exercise</label>
    <select id="exercise">
        <option>None</option>
        <option>1-2 times/week</option>
        <option>3-5 times/week</option>
        <option>Daily</option>
    </select>
</div>

<div class="form-group">
<label><i class="fa-solid fa-utensils"></i> Diet Quality</label>
    <select id="diet">
        <option>Poor</option>
        <option>Average</option>
        <option>Good</option>
        <option>Excellent</option>
    </select>
</div>

<div class="form-group">
<label><i class="fa-solid fa-wine-glass"></i> Alcohol</label>
    <select id="alcohol">
        <option>None</option>
        <option>Low</option>
        <option>Moderate</option>
        <option>High</option>
    </select>
</div>

<div class="form-group">
<label><i class="fa-solid fa-bed"></i> Sleep Hours</label>
    <input type="number" id="sleep">
</div>

<div class="form-group">
<label><i class="fa-solid fa-brain"></i> Stress Level</label>
    <input type="number" id="stress">
</div>

<button onclick="calculateRisk()">Analyze Health Risk</button>

<div class="result-box" id="resultBox">
    <h2 id="result"></h2>
    <p id="recommendation"></p>
    <ul id="breakdown"></ul>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
